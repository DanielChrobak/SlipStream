<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SlipStream</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="c"></canvas>

    <div class="tab-strip" id="tabStrip">
        <button class="tab-back" id="tabBack">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="tab-container" id="tabContainer"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-container">
            <div class="loading-spinner"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div></div>
            <div class="loading-status" id="loadingStatus">Connecting...</div>
            <div class="loading-substatus" id="loadingSubstatus">Initializing</div>
        </div>
    </div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container">
            <div class="auth-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h2 class="auth-title">Authentication</h2>
            <p class="auth-subtitle">Enter credentials to connect</p>
            <div class="auth-field">
                <label class="auth-label" for="usernameInput">Username</label>
                <input type="text" id="usernameInput" class="auth-input" maxlength="32" autocomplete="username" placeholder="Username" spellcheck="false">
            </div>
            <div class="auth-field">
                <label class="auth-label" for="passwordInput">Password</label>
                <input type="password" id="passwordInput" class="auth-input" maxlength="128" autocomplete="current-password" placeholder="Password">
            </div>
            <p class="auth-error" id="authError"></p>
            <button class="auth-btn" id="authSubmit">Login</button>
        </div>
    </div>

    <button class="edge" id="edge"></button>
    <div class="bk" id="bk"></div>

    <div class="pnl" id="pnl">
        <div class="ph">
            <span class="pt">Settings</span>
            <button class="px" id="pnlX">&times;</button>
        </div>
        <div class="pc">
            <div class="sec">
                <div class="btn-row">
                    <button class="btn" id="disconnectBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/></svg>
                        <span>Logout</span>
                    </button>
                    <button class="btn" id="fs">
                        <svg id="fsi" viewBox="0 0 24 24"><path id="fsp"/></svg>
                        <span id="fst">Fullscreen</span>
                    </button>
                </div>
            </div>
            <div class="sec">
                <div class="sl">Audio</div>
                <button class="btn bf" id="aBtn">
                    <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    <span id="aTxt">Enable</span>
                </button>
            </div>
            <div class="sec">
                <div class="sl">Capture</div>
                <div class="sw">
                    <span class="sla">Monitor</span>
                    <select class="sel" id="monSel"><option value="0">Waiting...</option></select>
                </div>
                <div class="sw">
                    <span class="sla">Frame Rate</span>
                    <select class="sel" id="fpsSel"><option value="15">15 FPS</option><option value="30">30 FPS</option><option value="60">60 FPS</option></select>
                </div>
            </div>
            <div class="sec">
                <div class="sl">Display</div>
                <div class="sw">
                    <span class="sla">Tabbed mode</span>
                    <button class="tog" id="tabbedModeBtn"><span class="tog-track"><span class="tog-thumb"></span></span></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/network.js"></script>
</body>
</html>
